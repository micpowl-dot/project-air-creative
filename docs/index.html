<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#030712;color:#F9FAFB;font-family:'DM Sans',-apple-system,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;background:none;border:0;color:inherit;cursor:pointer}
.wrap{max-width:1320px;margin:0 auto;padding:0 28px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2s infinite}
.row-grid{display:grid;grid-template-columns:minmax(220px,1.5fr) 2.4fr 1.1fr 1fr;gap:14px;align-items:center}
.gantt-row{display:grid;grid-template-columns:200px 1fr;gap:14px;align-items:center;padding:9px 0;border-bottom:1px solid #111827}
.gantt-row:last-child{border-bottom:0}
details>summary{list-style:none;cursor:pointer}
details>summary::-webkit-details-marker{display:none}
.task-row{display:grid;grid-template-columns:28px 56px 1.6fr 1.1fr 0.85fr 0.65fr;gap:10px;padding:8px 12px;border-radius:6px;align-items:center;font-size:12px}
.task-row:hover{background:#0D1117}
.task-row.done{color:#4B5563}
.task-row.done .task-name{text-decoration:line-through}
.late-1{background:#2A0A0A!important;border-left:3px solid #B91C1C}
.late-2{background:#4A0F0F!important;border-left:3px solid #DC2626;color:#FECACA}
.late-3{background:#6E1212!important;border-left:3px solid #EF4444;color:#FEE2E2}
.late-4{background:#8F1A1A!important;border-left:3px solid #FB7185;color:#FFF1F2;animation:lateBlink 2.4s ease-in-out infinite}
.task-row.late-1,.task-row.late-2,.task-row.late-3,.task-row.late-4{padding-left:9px}
.task-row.late-1:hover{background:#3A1414!important}
.task-row.late-2:hover{background:#5A1818!important}
.task-row.late-3:hover{background:#7E1A1A!important}
.task-row.late-4:hover{background:#9F2424!important}
@keyframes lateBlink{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 12px 0 rgba(239,68,68,.45)}}
.tbox{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border:1.5px solid #4B5563;border-radius:4px;background:#0D1117;transition:all .12s ease;position:relative}
.tbox:hover{border-color:#9CA3AF;background:#1F2937}
.tbox.checked{background:#10B981;border-color:#10B981}
.tbox.checked::after{content:"";position:absolute;top:2px;left:5px;width:4px;height:8px;border:solid #030712;border-width:0 2px 2px 0;transform:rotate(45deg)}
.tbox.override::before{content:"";position:absolute;top:-3px;right:-3px;width:6px;height:6px;border-radius:50%;background:#F59E0B;border:1px solid #030712}
@media (max-width:900px){
  .row-grid{grid-template-columns:1fr;gap:6px}
  .gantt-row{grid-template-columns:1fr;gap:4px}
  .task-row{grid-template-columns:28px 50px 1fr;gap:6px}
  .task-row > *:nth-child(n+4){grid-column:3/4}
}
</style>
</head>

const STATUS_META = {
  not_started: {label:"Not Started", bg:"#1F2937", fg:"#9CA3AF"},
  in_progress: {label:"In Progress", bg:"#4C1D95", fg:"#C4B5FD"},
  in_review:   {label:"In Review",   bg:"#713F12", fg:"#FDE68A"},
  approved:    {label:"Approved",    bg:"#1E3A5F", fg:"#93C5FD"},
  complete:    {label:"Complete",    bg:"#065F46", fg:"#A7F3D0"},
  blocked:     {label:"Blocked",     bg:"#7F1D1D", fg:"#FCA5A5"},
};

// ---------- STATE ----------
let LIVE = null;
let TASK_STATE = TASKS.map(t => ({...t, owner: [...(t.owner||[])]}));

// Manual overrides — wins over seed + live. Persisted in localStorage.
const OVR_KEY = "projectAirOverrides_v1";
let OVERRIDES = {};
try { OVERRIDES = JSON.parse(localStorage.getItem(OVR_KEY) || "{}"); } catch(e) { OVERRIDES = {}; }
function saveOverrides(){
  try { localStorage.setItem(OVR_KEY, JSON.stringify(OVERRIDES)); } catch(e) {}
}
window.toggleTask = function(id){
  const t = TASK_STATE.find(x => x.id === id);
  if (!t) return;
  const isDone = t.status === "complete" || t.status === "approved";
  OVERRIDES[id] = isDone ? "not_started" : "complete";
  saveOverrides();
  applyOverlay();
  render();
};
window.clearOverride = function(id, ev){
  if (ev) ev.stopPropagation();
  delete OVERRIDES[id];
  saveOverrides();
  applyOverlay();
  render();
};
window.jumpToTask = function(deliverable, taskId){
  const det = document.getElementById('d-' + deliverable);
  if (!det) return;
  det.open = true;
  requestAnimationFrame(() => {
    const target = taskId ? document.getElementById('task-' + taskId) : det;
    if (!target) return;
    target.scrollIntoView({behavior:'smooth', block:'center'});
    if (taskId){
      target.style.transition = 'background .25s';
      const prev = target.style.background;
      target.style.background = '#1E3A5F';
      setTimeout(() => { target.style.background = prev; }, 1200);
    }
  });
};

// ---------- HELPERS ----------
const $ = s => document.getElementById(s);
const fmtDate = iso => {
  if (!iso) return "";
  const d = new Date(iso.length===10 ? iso+"T12:00:00" : iso);
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
};
const dateMS = iso => new Date(iso.length===10 ? iso+"T23:59:59" : iso).getTime();
const daysLeft = () => Math.max(0, Math.ceil((EVENT_DATE - TODAY) / 86400000));
const isOverdue = (iso, status) => {
  if (!iso) return false;
  if (status === "complete" || status === "approved") return false;
  return TODAY.getTime() > dateMS(iso);
};
const daysLate = (iso, status) => {
  if (!isOverdue(iso, status)) return 0;
  return Math.max(0, Math.floor((TODAY.getTime() - dateMS(iso)) / 86400000));
};
const lateClass = days => days<=0 ? "" : days<=2 ? "late-1" : days<=5 ? "late-2" : days<=10 ? "late-3" : "late-4";
const member = n => TEAM.find(t => t.n === n);
const avatar = (name, size=22) => {
  const t = member(name);
  if (!t) return "";
  const op = t.dim ? .45 : 1;
  return `<span title="${t.n}${t.dim?' (paternity leave)':''}" style="display:inline-flex;width:${size}px;height:${size}px;border-radius:50%;background:${t.c};color:#fff;align-items:center;justify-content:center;font-size:${Math.round(size*.38)}px;font-weight:700;opacity:${op}">${t.i}</span>`;
};
const stack = (names, size=22) => {
  if (!names || !names.length) return `<span style="font-size:11px;color:#4B5563">—</span>`;
  const arr = Array.isArray(names) ? names : [names];
  return `<span style="display:inline-flex">${arr.map((n,i) =>
    `<span style="margin-left:${i?-6:0}px">${avatar(n,size)}</span>`).join("")}</span>`;
};
const statusPill = s => {
  const m = STATUS_META[s] || STATUS_META.not_started;
  return `<span style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;background:${m.bg};color:${m.fg};text-transform:uppercase;letter-spacing:.04em">${m.label}</span>`;
};

// ---------- COMPUTED ----------
function summarize(){
  const total = TASK_STATE.length;
  const done = TASK_STATE.filter(t => t.status==="complete"||t.status==="approved").length;
  const inProgress = TASK_STATE.filter(t => t.status==="in_progress"||t.status==="in_review").length;
  const blocked = TASK_STATE.filter(t => t.status==="blocked").length;
  const overdue = TASK_STATE.filter(t => isOverdue(t.due,t.status)).length;
  return {total, done, inProgress, blocked, overdue};
}
function deliverableSummary(id){
  const tasks = TASK_STATE.filter(t => t.d === id);
  const done = tasks.filter(t => t.status==="complete"||t.status==="approved").length;
  const inProgress = tasks.filter(t => t.status==="in_progress"||t.status==="in_review").length;
  const overdue = tasks.filter(t => isOverdue(t.due,t.status)).length;
  return {tasks, total: tasks.length, done, inProgress, overdue, pct: tasks.length ? done/tasks.length*100 : 0};
}
function attentionItems(){
  const horizon = TODAY.getTime() + 7*86400000;
  return TASK_STATE
    .filter(t => t.status!=="complete" && t.status!=="approved")
    .filter(t => dateMS(t.due) <= horizon)
    .sort((a,b) => dateMS(a.due) - dateMS(b.due));
}

// ---------- OVERLAY ----------
async function fetchLive(){
  try{
    const url = "https://raw.githubusercontent.com/micpowl-dot/project-air-creative/main/asset-tracker-status.json?t=" + Date.now();
    const r = await fetch(url, {cache:"no-store"});
    if (!r.ok) throw new Error("no-file");
    LIVE = await r.json();
    applyOverlay();
  } catch(e) {
    LIVE = null;
  }
  render();
}
function applyOverlay(){
  TASK_STATE = TASKS.map(t => ({...t, owner: [...(t.owner||[])]}));
  const byId = Object.fromEntries(TASK_STATE.map(t => [t.id, t]));
  if (LIVE && LIVE.task_updates){
    LIVE.task_updates.forEach(u => {
      const id = u.task_id || u.id;
      if (id && byId[id]){
        if (u.new_status) byId[id].status = u.new_status;
        if (u.owner) byId[id].owner = Array.isArray(u.owner) ? u.owner : [u.owner];
        if (u.due) byId[id].due = u.due;
        if (u.note) byId[id].note = u.note;
      }
    });
  }
  Object.entries(OVERRIDES).forEach(([id, status]) => {
    if (byId[id]) byId[id].status = status;
  });
}
applyOverlay();

// ---------- RENDERERS ----------
function renderHeader(){
  const days = daysLeft();
  const ringColor = "#2DD4BF";
  const r = 54, ci = 2*Math.PI*r;
  const progress = 1 - Math.min(1, days / 60);
  const offset = ci * (1 - progress);
  const liveDot = LIVE ? "#34D399" : "#F59E0B";
  const sources = ["Slack","Drive","GitHub","Figma","PPTX"];
  return `
  <div style="border-bottom:1px solid #1F2937;background:linear-gradient(180deg,#0D1117,#030712);padding:22px 0">
    <div class="wrap" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <span class="pulse" style="width:8px;height:8px;border-radius:50%;background:${liveDot};box-shadow:0 0 10px ${liveDot}"></span>
          <span style="font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#9CA3AF">${LIVE?"Live · n8n aggregator":"Static · waiting on aggregator"}</span>
        </div>
        <h1 style="font-size:30px;font-weight:800;letter-spacing:-.01em">Project AIR · Mission Control</h1>
        <p style="font-size:13px;color:#9CA3AF;margin-top:4px">The Weather Company · AI Day · June 9, 2026 · ~600 NA attendees · 5 deliverables · 60 tasks</p>
        <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
          ${sources.map(s => `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;background:${LIVE?"#064E3B":"#1F2937"};border:1px solid ${LIVE?"#065F46":"#374151"};font-size:10px;color:${LIVE?"#A7F3D0":"#6B7280"}"><span style="width:5px;height:5px;border-radius:50%;background:${LIVE?"#34D399":"#4B5563"}"></span>${s}</span>`).join("")}
        </div>
        <div style="font-size:11px;color:#6B7280;margin-top:10px">
          Data: <code style="color:#9CA3AF">assets/asset-tracker.md</code> seed + n8n aggregator overlay every 60s · <a href="https://github.com/micpowl-dot/project-air-creative" style="color:#9CA3AF;text-decoration:underline">repo</a>
        </div>
      </div>
      <div style="position:relative;width:128px;height:128px;flex-shrink:0">
        <svg width="128" height="128" viewBox="0 0 128 128">
          <circle cx="64" cy="64" r="${r}" fill="none" stroke="#1F2937" stroke-width="7"/>
          <circle cx="64" cy="64" r="${r}" fill="none" stroke="${ringColor}" stroke-width="7" stroke-dasharray="${ci}" stroke-dashoffset="${offset}" stroke-linecap="round" transform="rotate(-90 64 64)"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <span style="font-size:34px;font-weight:800;color:${ringColor};line-height:1">${days}</span>
          <span style="font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.1em;margin-top:2px">days left</span>
        </div>
      </div>
    </div>
  </div>`;
}

function renderGantt(){
  const start = new Date("2026-05-05T00:00:00").getTime();
  const end = EVENT_DATE.getTime();
  const span = end - start;
  const pct = ms => Math.max(0, Math.min(100, ((ms - start)/span) * 100));
  const todayPct = pct(TODAY.getTime());
  const labelTicks = [
    {d:"2026-05-08",l:"May 8"},
    {d:"2026-05-15",l:"May 15"},
    {d:"2026-05-22",l:"May 22"},
    {d:"2026-05-29",l:"May 29"},
    {d:"2026-06-05",l:"Jun 5"},
    {d:"2026-06-09",l:"Jun 9"},
  ];
  return `
  <section style="margin-top:24px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:10px;flex-wrap:wrap">
      <h2 style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#D1D5DB"><i class="ti ti-timeline-event"></i> Timeline</h2>
      <span style="font-size:11px;color:#6B7280">Design (purple) · Production (amber) · Today (red)</span>
    </div>
    <div style="background:#0D1117;border:1px solid #1F2937;border-radius:12px;padding:16px 20px">
      <div style="position:relative">
        ${DELIVERABLES.map(d => {
          const dStart = pct(dateMS(d.designStart));
          const dEnd = pct(dateMS(d.designEnd));
          const dWidth = dEnd - dStart;
          const pStart = d.productionStart ? pct(dateMS(d.productionStart)) : null;
          const pEnd = d.productionEnd ? pct(dateMS(d.productionEnd)) : null;
          return `
          <div class="gantt-row">
            <div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="jumpToTask('${d.id}')" title="Jump to ${d.id} tasks">
              <span style="font-size:10px;font-weight:800;color:#9CA3AF;letter-spacing:.06em;padding:2px 5px;background:#1F2937;border-radius:3px">${d.id}</span>
              <span style="font-size:11px;color:#D1D5DB;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.name}</span>
            </div>
            <div style="position:relative;height:18px">
              <div style="position:absolute;top:6px;left:0;right:0;height:6px;background:#111827;border-radius:3px"></div>
              <div title="Design ${fmtDate(d.designStart)}–${fmtDate(d.designEnd)}" style="position:absolute;top:4px;height:10px;left:${dStart}%;width:${dWidth}%;background:linear-gradient(90deg,#6D28D9,#8B5CF6);border-radius:3px;box-shadow:0 0 0 1px #4C1D95"></div>
              ${pStart !== null ? `<div title="Production ${fmtDate(d.productionStart)}–${fmtDate(d.productionEnd)}" style="position:absolute;top:4px;height:10px;left:${pStart}%;width:${pEnd-pStart}%;background:linear-gradient(90deg,#B45309,#F59E0B);border-radius:3px;box-shadow:0 0 0 1px #78350F"></div>`:""}
            </div>
          </div>`;
        }).join("")}
        <div style="position:absolute;top:0;bottom:0;left:calc(214px + (100% - 214px) * ${todayPct} / 100);width:1px;background:rgba(239,68,68,.85);pointer-events:none;z-index:5"></div>
      </div>
      <div style="display:grid;grid-template-columns:200px 1fr;gap:14px;margin-top:10px;border-top:1px solid #1F2937;padding-top:14px">
        <div></div>
        <div style="position:relative;height:22px">
          ${labelTicks.map(t => `<span style="position:absolute;top:0;left:${pct(dateMS(t.d))}%;transform:translateX(-50%);font-size:10px;color:#6B7280">${t.l}</span>`).join("")}
          <span style="position:absolute;left:${todayPct}%;transform:translateX(-50%);top:-2px;font-size:9px;font-weight:800;color:#EF4444;background:#030712;padding:1px 6px;border-radius:4px;border:1px solid #7F1D1D;white-space:nowrap">TODAY · ${TODAY.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
        </div>
      </div>
    </div>
  </section>`;
}

function renderAttention(){
  const items = attentionItems();
  if (!items.length) return "";
  const overdueCount = items.filter(t => isOverdue(t.due,t.status)).length;
  return `
  <section style="margin-top:24px">
    <h2 style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#FCA5A5;margin-bottom:10px"><i class="ti ti-alert-triangle"></i> Needs attention now · ${items.length} item${items.length===1?"":"s"}${overdueCount?` · ${overdueCount} overdue`:""}</h2>
    <div style="background:linear-gradient(135deg,#1A0606,#0D1117);border:1px solid #7F1D1D;border-radius:12px;padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">
      ${items.slice(0,12).map(t => {
        const od = isOverdue(t.due,t.status);
        const late = daysLate(t.due,t.status);
        const bg = late<=0 ? "#0D1117" : late<=2 ? "#2A0A0A" : late<=5 ? "#4A0F0F" : late<=10 ? "#6E1212" : "#8F1A1A";
        const border = late<=0 ? "#F59E0B" : late<=2 ? "#B91C1C" : late<=5 ? "#DC2626" : late<=10 ? "#EF4444" : "#FB7185";
        return `
        <div onclick="jumpToTask('${t.d}','${t.id}')" style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 12px;background:${bg};border-radius:7px;border-left:4px solid ${border};cursor:pointer${late>10?";animation:lateBlink 2.4s ease-in-out infinite":""}" title="Jump to ${t.id}">
          <div style="min-width:0;flex:1">
            <div style="font-size:11px;font-weight:700;color:#9CA3AF;letter-spacing:.04em">${t.id}</div>
            <div style="font-size:12px;color:${od?"#FECACA":"#F3F4F6"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.name}</div>
          </div>
          <div style="flex-shrink:0">${stack(t.owner, 20)}</div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;font-weight:700;color:${od?"#FCA5A5":"#FDE68A"};${od?"text-decoration:line-through":""}">${fmtDate(t.due)}</div>
            ${od ? `<div style="font-size:8px;font-weight:800;color:#EF4444;letter-spacing:.08em">+${late}d LATE</div>` : ""}
          </div>
        </div>`;
      }).join("")}
    </div>
  </section>`;
}

function renderStats(){
  const s = summarize();
  const signals = LIVE?.signals_processed ?? 0;
  const lastUpdated = LIVE?.last_updated ? new Date(LIVE.last_updated).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"}) : "—";
  const tiles = [
    {l:"Total tasks", v:`${s.total - s.done} <span style="font-size:18px;color:#9CA3AF;font-weight:600">of ${s.total}</span>`, s:`${s.done} complete · ${s.inProgress} active`},
    {l:"Activity",    v:signals, s:`${signals?"updates":"no updates"} · last ${lastUpdated}`},
    {l:"Blockers",    v:s.blocked, s:s.blocked?"attention":"clear", alert:s.blocked>0},
    {l:"Overdue",     v:s.overdue, s:"deadlines past", alert:s.overdue>0},
  ];
  return `
  <section style="margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">
    ${tiles.map(t => `
      <div style="background:#0D1117;border:1px solid ${t.alert?"#7F1D1D":"#1F2937"};border-radius:10px;padding:14px 16px">
        <div style="font-size:9px;font-weight:700;color:#6B7280;letter-spacing:.12em;text-transform:uppercase">${t.l}</div>
        <div style="font-size:28px;font-weight:800;color:${t.alert?"#FCA5A5":"#F9FAFB"};margin-top:2px;line-height:1">${t.v}</div>
        <div style="font-size:10px;color:#6B7280;margin-top:4px">${t.s}</div>
      </div>`).join("")}
  </section>`;
}

function renderDeliverableRow(d){
  const sum = deliverableSummary(d.id);
  const designOverdue = TODAY.getTime() > dateMS(d.designEnd) && sum.done < sum.total;
  const prodOverdue = d.productionEnd && TODAY.getTime() > dateMS(d.productionEnd);
  const owners = [...new Set(sum.tasks.flatMap(t => t.owner || []))];
  const barColor = sum.pct === 100 ? "#10B981" : sum.pct > 50 ? "#3B82F6" : sum.pct > 0 ? "#8B5CF6" : "#374151";
  const maxLate = Math.max(0, ...sum.tasks.map(t => daysLate(t.due, t.status)));
  const dBg = maxLate<=0 ? "#0D1117" : maxLate<=2 ? "#180A0A" : maxLate<=5 ? "#2A0F0F" : maxLate<=10 ? "#3D1212" : "#5B1616";
  const dBorder = maxLate<=0 ? "#1F2937" : maxLate<=2 ? "#7F1D1D" : maxLate<=5 ? "#991B1B" : maxLate<=10 ? "#B91C1C" : "#DC2626";
  const dLeftBorder = maxLate<=0 ? "" : `;border-left:4px solid ${maxLate<=2?"#B91C1C":maxLate<=5?"#DC2626":maxLate<=10?"#EF4444":"#FB7185"}`;

  return `
  <details id="d-${d.id}" style="background:${dBg};border:1px solid ${dBorder};border-radius:10px;margin-bottom:8px;scroll-margin-top:20px${dLeftBorder}">
    <summary style="padding:14px 18px">
      <div class="row-grid">
        <div style="display:flex;align-items:center;gap:10px">
          <i class="ti ${d.icon}" style="font-size:20px;color:#9CA3AF"></i>
          <div>
            <div style="font-size:10px;font-weight:700;color:#6B7280;letter-spacing:.1em">${d.id}</div>
            <div style="font-size:14px;font-weight:700;color:#F9FAFB">${d.name}</div>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:11px;color:#9CA3AF">${Math.round(sum.pct)}% · ${sum.done}/${sum.total}</span>
            <span style="font-size:10px;color:#6B7280">${sum.inProgress} in flight${sum.overdue?` · <span style="color:#FCA5A5">${sum.overdue} overdue</span>`:""}</span>
          </div>
          <div style="height:6px;background:#1F2937;border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${sum.pct}%;background:${barColor};border-radius:3px"></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 8px;background:${designOverdue?"#2A0808":"#1E1B4B"};border:1px solid ${designOverdue?"#7F1D1D":"#312E81"};border-radius:5px;font-size:10px;color:${designOverdue?"#FCA5A5":"#C4B5FD"};${designOverdue?"text-decoration:line-through":""}">
            <span style="opacity:.7">Design</span> ${fmtDate(d.designEnd)}${designOverdue?' <span style="color:#EF4444;font-weight:800;text-decoration:none">OD</span>':""}
          </span>
          ${d.productionEnd ? `<span style="display:inline-flex;align-items:center;gap:6px;padding:3px 8px;background:${prodOverdue?"#2A0808":"#422006"};border:1px solid ${prodOverdue?"#7F1D1D":"#78350F"};border-radius:5px;font-size:10px;color:${prodOverdue?"#FCA5A5":"#FDE68A"}">
            <span style="opacity:.7">Ship</span> ${fmtDate(d.productionEnd)}
          </span>` : `<span style="font-size:10px;color:#374151;padding-left:2px">Digital only</span>`}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          ${stack(owners, 24)}
          ${d.vendor ? `<span style="font-size:10px;color:#6B7280">${d.vendor}</span>` : ""}
        </div>
      </div>
    </summary>
    <div style="padding:4px 18px 14px;border-top:1px solid #111827">
      <div class="task-row" style="font-size:9px;font-weight:700;color:#6B7280;letter-spacing:.08em;text-transform:uppercase;background:none">
        <div></div><div>ID</div><div>Task</div><div>Owner</div><div>Due</div><div>Status</div>
      </div>
      ${sum.tasks.map(t => {
        const od = isOverdue(t.due, t.status);
        const late = daysLate(t.due, t.status);
        const done = t.status === "complete" || t.status === "approved";
        const hasOverride = OVERRIDES[t.id] !== undefined;
        const cbTitle = (done?"Uncheck to mark not started":"Check to mark complete") + (hasOverride?" · manually overridden (right-click or shift-click to clear)":"");
        return `
        <div id="task-${t.id}" class="task-row ${done?"done":""} ${lateClass(late)}" style="scroll-margin-top:30px">
          <div>
            <span class="tbox ${done?"checked":""} ${hasOverride?"override":""}"
                  title="${cbTitle}"
                  onclick="if(event.shiftKey){clearOverride('${t.id}',event)}else{toggleTask('${t.id}')}"
                  oncontextmenu="event.preventDefault();clearOverride('${t.id}',event)"></span>
          </div>
          <div style="font-size:10px;font-weight:700;color:#6B7280;letter-spacing:.04em">${t.id}</div>
          <div>
            <div class="task-name" style="color:${done?"#4B5563":"#E5E7EB"}">${t.name}</div>
            ${t.note ? `<div style="font-size:10px;color:#6B7280;margin-top:2px">${t.note}</div>` : ""}
          </div>
          <div>${stack(t.owner, 20)}</div>
          <div style="font-size:11px;color:${od?"#FCA5A5":done?"#4B5563":"#D1D5DB"};${od?"text-decoration:line-through":""}">
            ${fmtDate(t.due)}${od?` <span style="font-size:9px;font-weight:800;color:#EF4444;text-decoration:none">+${late}d</span>`:""}
          </div>
          <div>${statusPill(t.status)}</div>
        </div>`;
      }).join("")}
    </div>
  </details>`;
}

function renderDeliverables(){
  const sorted = [...DELIVERABLES].sort((a,b) => dateMS(a.designEnd) - dateMS(b.designEnd));
  return `
  <section style="margin-top:24px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:10px;flex-wrap:wrap">
      <h2 style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#D1D5DB"><i class="ti ti-stack-2"></i> Deliverables · sorted by design deadline</h2>
      <span style="font-size:11px;color:#6B7280">Click any row to expand all tasks</span>
    </div>
    ${sorted.map(renderDeliverableRow).join("")}
  </section>`;
}

function renderTeamAndBlockers(){
  const blockerLines = [...(LIVE?.blockers_detected || []), ...TASK_STATE.filter(t => t.status==="blocked").map(t => `${t.id} · ${t.name}`)];

  const load = name => {
    const tasks = TASK_STATE.filter(t => (t.owner||[]).includes(name));
    const done = tasks.filter(t => t.status==="complete"||t.status==="approved").length;
    const overdue = tasks.filter(t => isOverdue(t.due,t.status)).length;
    const deliverables = [...new Set(tasks.map(t => t.d))].sort();
    return {total: tasks.length, done, overdue, deliverables};
  };

  return `
  <section style="margin-top:24px;display:grid;grid-template-columns:1fr 1.5fr;gap:14px">
    <div>
      <h2 style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#FCA5A5;margin-bottom:10px"><i class="ti ti-octagon-off"></i> Blockers</h2>
      <div style="background:#0D1117;border:1px solid #1F2937;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px">
        ${blockerLines.length ? blockerLines.map(b => `<div style="padding:8px 12px;background:#1A0606;border-radius:6px;border-left:3px solid #EF4444;font-size:12px;color:#FCA5A5">${b}</div>`).join("") : `<div style="font-size:12px;color:#4B5563;padding:8px 12px;text-align:center">No blockers</div>`}
      </div>
    </div>
    <div>
      <h2 style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#D1D5DB;margin-bottom:10px"><i class="ti ti-users"></i> Team</h2>
      <div style="background:#0D1117;border:1px solid #1F2937;border-radius:10px;padding:6px">
        ${TEAM.map(t => {
          const l = load(t.n);
          const isWriter = t.n === "Mark Fredo" || t.n === "Jeffrey Hampton";
          const op = t.dim ? .5 : 1;
          return `
          <div style="display:grid;grid-template-columns:auto 1.4fr 1fr auto;gap:12px;align-items:center;padding:8px 10px;border-radius:6px;opacity:${op}">
            ${avatar(t.n, 32)}
            <div>
              <div style="font-size:13px;font-weight:600;color:#F3F4F6">${t.n}${t.dim?" <span style='font-size:10px;color:#F59E0B;font-weight:700'>· LEAVE</span>":""}</div>
              <div style="font-size:10px;color:#6B7280">${t.r}</div>
            </div>
            <div style="font-size:11px;color:#9CA3AF">
              ${isWriter || !l.total ? `<span style="color:#374151">— no assignments</span>` : l.deliverables.map(id => `<span onclick="jumpToTask('${id}')" title="Jump to ${id}" style="display:inline-block;cursor:pointer;color:#D1D5DB;padding:2px 6px;margin-right:4px;background:#1F2937;border-radius:3px;font-weight:700;font-size:10px;letter-spacing:.06em">${id}</span>`).join("")}
            </div>
            <div style="text-align:right">
              ${l.total ? `<div style="font-size:12px;font-weight:700;color:#F9FAFB">${l.done}/${l.total}</div><div style="font-size:9px;color:${l.overdue?"#FCA5A5":"#6B7280"}">${l.overdue?l.overdue+" overdue":"on track"}</div>` : `<span style="font-size:10px;color:#374151">—</span>`}
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>
  </section>`;
}

function renderFooter(){
  return `
  <footer style="margin-top:32px;padding:18px 0 24px;border-top:1px solid #1F2937;text-align:center">
    <div style="font-size:11px;color:#4B5563">
      Data: <code style="color:#6B7280">assets/asset-tracker.md</code> seed + n8n aggregator overlay every 60s ·
      <a href="https://github.com/micpowl-dot/project-air-creative" style="color:#6B7280;text-decoration:underline">repo</a>
    </div>
  </footer>`;
}

function render(){
  $("app").innerHTML = `
    ${renderHeader()}
    <main class="wrap" style="padding:8px 0 24px">
      ${renderStats()}
      ${renderGantt()}
      ${renderAttention()}
      ${renderDeliverables()}
      ${renderTeamAndBlockers()}
      ${renderFooter()}
    </main>
  `;
}

render();
fetchLive();
setInterval(fetchLive, 60000);
</script>
</body>
</html>
